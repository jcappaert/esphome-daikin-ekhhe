select:
  - platform: daikin_ekhhe
    power_status:
      name: "Power status"
    operational_mode:
      name: "Operational mode"
    defrosting_mode:
      name: "P5: Defrosting mode"
    elec_heater_during_defrosting:
      name: "P6: Electric heater during defrosting"
    display_water_probe_temp:
      name: "P11: Display water probe"
    external_pump_mode:
