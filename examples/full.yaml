    hw_circ_pump_mode:
      name: "P13: HW Circulation pump mode"
    evaporator_blower_type:
      name: "P14: Evaporator blower type"
    safety_flow_switch_type:
      name: "P15: Safety flow switch type"
    solar_mode_integration:
