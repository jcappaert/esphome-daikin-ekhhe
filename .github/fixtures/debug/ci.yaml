esphome:
  name: daikin-ekhhe-ci-debug
  friendly_name: Daikin EKHHE CI Debug

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "ci-placeholder"
  password: "ci-placeholder"

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source:
      type: local
      path: ../../../components
    components: [daikin_ekhhe]

uart:
  rx_pin: GPIO20
  tx_pin: GPIO21
  baud_rate: 9600
  parity: NONE
  stop_bits: 1
  id: my_uart

daikin_ekhhe:
  - id: daikin_component
    update_interval: 10
    mode: debug
    tx_send_calibration: 75

sensor:
  - platform: daikin_ekhhe
    low_water_temp_probe:
      name: "CI Debug Low Water Temperature probe"
    fan_speed_rpm:
      name: "CI Debug Fan Speed RPM"
    frames_captured_total:
      name: "CI Frames Captured"

binary_sensor:
  - platform: daikin_ekhhe
    dig1_config:
      name: "CI Debug DIG1 setting"
    p01_tank_lower_probe_fault:
      name: "CI Debug P01 Tank Lower Probe Fault"
    p02_tank_upper_probe_fault:
      name: "CI Debug P02 Tank Upper Probe Fault"
    p03_defrost_probe_fault:
      name: "CI Debug P03 Defrost Probe Fault"
    p04_inlet_air_probe_fault:
      name: "CI Debug P04 Inlet Air Probe Fault"
    p05_evaporator_inlet_probe_fault:
      name: "CI Debug P05 Evaporator Inlet Probe Fault"
    p06_evaporator_outlet_probe_fault:
      name: "CI Debug P06 Evaporator Outlet Probe Fault"
    p07_compressor_flow_probe_fault:
      name: "CI Debug P07 Compressor Flow Probe Fault"
    p08_solar_collector_probe_fault:
      name: "CI Debug P08 Solar Collector Probe Fault"
    e02_solar_recirculation_alarm:
      name: "CI Debug E02 Solar Recirculation Alarm"
    e03_electronic_fan_fault:
      name: "CI Debug E03 Electronic Fan Fault"
    pa_heat_pump_temperature_unsuitable_alarm:
      name: "CI Debug PA Heat Pump Temperature Unsuitable"

number:
  - platform: daikin_ekhhe
    low_water_hp_hysteris:
      name: "CI Debug Lower water temp hysteresis"
    evaporator_fan_defrost_speed_setpoint:
      name: "CI Debug P53 Evaporator Fan Defrost Speed"
    low_pressure_switch_bypass_time:
      name: "CI Debug P54 Low Pressure Bypass Time"
    ec_fan_speed_regulator_gain:
      name: "CI Debug P72 EC Fan Speed Regulator Gain"
    tx_send_calibration:
      name: "CI TX Send Calibration"

select:
  - platform: daikin_ekhhe
    operational_mode:
      name: "CI Debug Operational mode"
    evaporator_fan_compressor_off_mode:
      name: "CI Debug P58 Evaporator Fan Compressor Off Mode"
  - platform: daikin_ekhhe
    daikin_debug_packet:
      name: "CI Debug Packet"

text_sensor:
  - platform: daikin_ekhhe
    current_time:
      name: "CI Current Time UTC"
    power_board_firmware_version:
      name: "CI Power Board Firmware Version"
    ui_firmware_version:
      name: "CI UI Firmware Version"
    daikin_raw_frame_meta:
      name: "CI Debug Raw Frame Meta"
    daikin_known_good_profile_status:
      name: "CI Known Good Profile Status"
    daikin_auto_snapshot_status:
      name: "CI Auto Snapshot Status"

switch:
  - platform: daikin_ekhhe
    daikin_debug_freeze:
      name: "CI Debug Freeze"

button:
  - platform: daikin_ekhhe
    daikin_save_known_good_profile:
      name: "CI Save Known Good Profile"
    daikin_restore_known_good_profile:
      name: "CI Restore Known Good Profile"
    daikin_restore_auto_snapshot:
      name: "CI Restore Auto Snapshot"
