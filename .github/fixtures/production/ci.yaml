esphome:
  name: daikin-ekhhe-ci-production
  friendly_name: Daikin EKHHE CI Production

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "ci-placeholder"
  password: "ci-placeholder"

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source:
      type: local
      path: ../../../components
    components: [daikin_ekhhe]

uart:
  rx_pin: GPIO20
  tx_pin: GPIO21
  baud_rate: 9600
  parity: NONE
  stop_bits: 1
  id: my_uart

daikin_ekhhe:
  - id: daikin_component
    update_interval: 10
    mode: production

sensor:
  - platform: daikin_ekhhe
    low_water_temp_probe:
      name: "CI Low Water Temperature probe"
    fan_speed_rpm:
      name: "CI Fan Speed RPM"

binary_sensor:
  - platform: daikin_ekhhe
    dig1_config:
      name: "CI DIG1 setting"

number:
  - platform: daikin_ekhhe
    low_water_hp_hysteris:
      name: "CI Lower water temp hysteresis"
    evaporator_fan_defrost_speed_setpoint:
      name: "CI P53 Evaporator Fan Defrost Speed"
    low_pressure_switch_bypass_time:
      name: "CI P54 Low Pressure Bypass Time"
    ec_fan_speed_regulator_gain:
      name: "CI P72 EC Fan Speed Regulator Gain"

select:
  - platform: daikin_ekhhe
    operational_mode:
      name: "CI Operational mode"
    evaporator_fan_compressor_off_mode:
      name: "CI P58 Evaporator Fan Compressor Off Mode"

button:
  - platform: daikin_ekhhe
    daikin_restore_default_settings:
      name: "CI Restore Default Settings"
    daikin_save_known_good_profile:
      name: "CI Save Known Good Profile"
    daikin_restore_known_good_profile:
      name: "CI Restore Known Good Profile"
    daikin_restore_auto_snapshot:
      name: "CI Restore Auto Snapshot"

text_sensor:
  - platform: daikin_ekhhe
    power_board_firmware_version:
      name: "CI Power Board Firmware Version"
    ui_firmware_version:
      name: "CI UI Firmware Version"
    daikin_raw_frame_meta:
      name: "CI Raw Frame Meta"
    daikin_known_good_profile_status:
      name: "CI Known Good Profile Status"
    daikin_auto_snapshot_status:
      name: "CI Auto Snapshot Status"
