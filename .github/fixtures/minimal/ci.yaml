esphome:
  name: daikin-ekhhe-ci-minimal
  friendly_name: Daikin EKHHE CI Minimal

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "ci-placeholder"
  password: "ci-placeholder"

external_components:
  - source:
      type: local
      path: ../../../components
    components: [daikin_ekhhe]

uart:
  rx_pin: GPIO20
  tx_pin: GPIO21
  baud_rate: 9600
  parity: NONE
  stop_bits: 1
  id: my_uart

daikin_ekhhe:
  - id: daikin_component
    update_interval: 10
    mode: production
