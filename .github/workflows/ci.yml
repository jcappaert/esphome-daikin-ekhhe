name: CI

on:
  push:
  pull_request:

jobs:
  esphome-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - .github/fixtures/production/ci.yaml
          - .github/fixtures/debug/ci.yaml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ESPHome
        run: pip install esphome==2026.1.2

      - name: Validate config
        run: esphome config ${{ matrix.config }}

      - name: Compile firmware
        run: esphome compile ${{ matrix.config }}
